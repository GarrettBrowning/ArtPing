<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArtPing — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <a href="index.html" class="nav-logo">ArtPing</a>
      <p>Your creative space.</p>
    </div>

    <div class="auth-card">
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-sub">Already have an account? <a href="login.html">Sign in</a></p>

      <form action="/api/register" method="POST" class="auth-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="text" id="email" name="email" placeholder="Enter email" required>
        </div>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        <div class="field">
          <label for="password-repeat">Repeat Password</label>
          <input type="password" id="password-repeat" name="password-repeat" placeholder="Repeat password" required>
        </div>
        <label class="checkbox-label">
          <input type="checkbox" name="remember" checked> Remember me
        </label>
        <div class="auth-actions">
          <button type="button" class="btn-outline" onclick="location.href='index.html'">Cancel</button>
          <button type="submit" class="btn-primary">Sign Up</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
